databases:
  - name: br-solar-scan-db
    plan: free

services:
  - type: web
    name: br-solar-scan
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOW_PUBLIC_SIGNUP
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: br-solar-scan-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: NREL_API_KEY
        sync: false
      - key: NREL_FULL_NAME
        sync: false
      - key: NREL_EMAIL
        sync: false
      - key: RENOVIGI_COMPANY_KEY
        sync: false
