databases:
  - name: br-solar-scan-db
    plan: free

services:
  - type: web
    name: br-solar-scan
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /healthz/
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.2
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_ALLOW_PUBLIC_SIGNUP
        value: "true"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: br-solar-scan-db
          property: connectionString
      - key: DJANGO_SUPERUSER_USERNAME
        value: admin
      - key: DJANGO_SUPERUSER_EMAIL
        sync: false
      - key: DJANGO_SUPERUSER_PASSWORD
        sync: false
      - key: NREL_API_KEY
        sync: false
      - key: NREL_FULL_NAME
        sync: false
      - key: NREL_EMAIL
        sync: false
      - key: RENOVIGI_COMPANY_KEY
        sync: false
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DJANGO_EMAIL_HOST
        value: smtp.gmail.com
      - key: DJANGO_EMAIL_PORT
        value: "587"
      - key: DJANGO_EMAIL_HOST_USER
        sync: false
      - key: DJANGO_EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_EMAIL_USE_TLS
        value: "true"
      - key: DEFAULT_FROM_EMAIL
        sync: false
      - key: ACCOUNT_LOGIN_URL
        value: https://br-solar-scan.onrender.com/accounts/login/
